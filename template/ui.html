<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #0d1117; color: #e6edf3; min-height: 100vh; }
.header { background: #161b22; border-bottom: 1px solid #30363d; padding: 20px 40px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 22px; color: #fff; }
.header span { font-size: 13px; color: #8b949e; }
.badge { background: #1f6feb; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 12px; }
.main { max-width: 900px; margin: 40px auto; padding: 0 20px; }
.input-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 28px; margin-bottom: 32px; }
.input-card h2 { font-size: 15px; color: #8b949e; margin-bottom: 20px; }
.input-row { display: flex; gap: 12px; }
input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; font-family: monospace; font-size: 14px; padding: 10px 14px; border-radius: 8px; flex: 1; outline: none; }
input:focus { border-color: #1f6feb; }
input::placeholder { color: #484f58; }
button { background: #1f6feb; color: #fff; border: none; font-family: monospace; font-size: 14px; font-weight: 600; padding: 10px 24px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
button:hover { background: #388bfd; }
button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.agents { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.agent-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
.agent-card.writer { border-top: 3px solid #3b82f6; }
.agent-card.reviewer { border-top: 3px solid #f59e0b; }
.agent-card.redteam { border-top: 3px solid #ef4444; }
.agent-card.orchestrator { border-top: 3px solid #8b5cf6; grid-column: span 2; }
.agent-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 12px; }
.writer .agent-label { color: #3b82f6; }
.reviewer .agent-label { color: #f59e0b; }
.redteam .agent-label { color: #ef4444; }
.orchestrator .agent-label { color: #8b5cf6; }
.agent-output { font-size: 12px; color: #8b949e; line-height: 1.7; white-space: pre-wrap; min-height: 80px; }
.agent-output.loading { color: #484f58; }
.verdict { text-align: center; padding: 20px; border-radius: 12px; font-size: 16px; font-weight: 700; letter-spacing: 1px; margin-top: 8px; }
.verdict.approved { background: #0f2a1a; border: 1px solid #10b981; color: #10b981; }
.verdict.changes { background: #2a0f0f; border: 1px solid #ef4444; color: #ef4444; }
.verdict.hidden { display: none; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #30363d; border-top-color: #1f6feb; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>🛡️ PR Guardian</h1>
  <span>Multi-Agent Adversarial Code Review</span>
  <span class="badge">4 AGENTS</span>
</div>

<div class="main">
  <div class="input-card">
    <h2>ENTER PULL REQUEST DETAILS</h2>
    <div class="input-row">
      <input id="repo" type="text" placeholder="owner/repo — e.g. pallets/flask" />
      <input id="pr" type="text" placeholder="PR number — e.g. 6066" style="max-width: 180px;"/>
      <button id="btn" onclick="runReview()">Review PR</button>
    </div>
  </div>

  <div class="agents">
    <div class="agent-card writer">
      <div class="agent-label">WRITER AGENT</div>
      <div class="agent-output loading" id="writer-out">Waiting for input...</div>
    </div>
    <div class="agent-card reviewer">
      <div class="agent-label">REVIEWER AGENT</div>
      <div class="agent-output loading" id="reviewer-out">Waiting for input...</div>
    </div>
    <div class="agent-card redteam">
      <div class="agent-label">RED TEAM AGENT</div>
      <div class="agent-output loading" id="redteam-out">Waiting for input...</div>
    </div>
    <div class="agent-card orchestrator">
      <div class="agent-label">ORCHESTRATOR</div>
      <div class="agent-output loading" id="orchestrator-out">Waiting for input...</div>
    </div>
  </div>

  <div class="verdict hidden" id="verdict"></div>
</div>

<script>
async function runReview() {
  const repo = document.getElementById("repo").value.trim();
  const pr = document.getElementById("pr").value.trim();
  if (!repo || !pr) { alert("Please enter both repo and PR number"); return; }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Reviewing...';

  setOutput("writer-out", "Analyzing code quality...", true);
  setOutput("reviewer-out", "Waiting for Writer...", true);
  setOutput("redteam-out", "Preparing security probe...", true);
  setOutput("orchestrator-out", "Pipeline starting...", true);
  document.getElementById("verdict").className = "verdict hidden";

  try {
    const res = await fetch("/review", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ repo, pr_number: pr })
    });
    const data = await res.json();

    if (!data.success) {
      setOutput("writer-out", "Error: " + data.error, false);
      setOutput("reviewer-out", "Pipeline failed.", false);
      setOutput("redteam-out", "Pipeline failed.", false);
      setOutput("orchestrator-out", "Pipeline failed.", false);
    } else {
      setOutput("writer-out", data.writer, false);
      setOutput("reviewer-out", data.reviewer, false);
      setOutput("redteam-out", data.red_team, false);

      const orchText = data.disagreement
        ? "⚠️ DISAGREEMENT DETECTED\nReviewer challenged the Writer's assessment.\nHuman escalation required — maintainer must make final call."
        : "✅ CONSENSUS REACHED\nAll agents agree. PR can be auto-processed.";
      setOutput("orchestrator-out", orchText, false);

      const verdict = document.getElementById("verdict");
      verdict.textContent = data.disagreement ? "⚠ FINAL VERDICT: CHANGES REQUESTED" : "✅ FINAL VERDICT: AUTO-APPROVED";
      verdict.className = "verdict " + (data.disagreement ? "changes" : "approved");
    }
  } catch (e) {
    setOutput("writer-out", "Network error: " + e.message, false);
  }

  btn.disabled = false;
  btn.innerHTML = "Review PR";
}

function setOutput(id, text, loading) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = "agent-output" + (loading ? " loading" : "");
}
</script>
</body>
</html>
